<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Claims Assistant</title>
<style>
  :root{--bg:#f6f7f9;--panel:#fff;--ink:#1b3037;--muted:#618793;--accent:#ff3620;--teal:#1b5161;--line:#e6e9ec;}
  *{box-sizing:border-box}
  body{margin:0;font:15px/1.5 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg);height:100vh;display:flex;flex-direction:column}
  header{padding:14px 20px;background:var(--panel);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
  header b{font-size:16px}header span{color:var(--muted);font-size:13px}
  #chat{flex:1;overflow-y:auto;padding:20px;max-width:860px;width:100%;margin:0 auto}
  .msg{margin:14px 0;display:flex;gap:10px}
  .msg .who{width:30px;height:30px;border-radius:50%;flex:0 0 30px;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff}
  .user .who{background:var(--teal)} .bot .who{background:var(--accent)}
  .bubble{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px 14px;max-width:100%;overflow-x:auto}
  .user .bubble{background:#eef4f6}
  .bubble h1,.bubble h2,.bubble h3{font-size:15px;margin:.5em 0 .2em}
  .bubble ul{margin:.3em 0;padding-left:1.2em}
  .bubble code{background:#f1f1f1;padding:1px 4px;border-radius:4px;font-size:13px}
  .steps{margin:2px 0 6px}
  .step{border:1px solid var(--line);border-left:3px solid var(--teal);background:#fbfcfd;border-radius:8px;margin:6px 0;font-size:13px}
  .step summary{cursor:pointer;padding:7px 12px;color:var(--teal);font-weight:600;list-style:none;display:flex;align-items:center;gap:8px}
  .step summary::-webkit-details-marker{display:none}
  .step .body{padding:0 12px 10px 12px;color:var(--muted);white-space:pre-wrap;font-family:ui-monospace,Menlo,monospace;font-size:12px}
  .spin{width:12px;height:12px;border:2px solid var(--line);border-top-color:var(--teal);border-radius:50%;animation:s .7s linear infinite;display:inline-block}
  @keyframes s{to{transform:rotate(360deg)}}
  footer{border-top:1px solid var(--line);background:var(--panel);padding:12px}
  .row{max-width:860px;margin:0 auto;display:flex;gap:8px}
  textarea{flex:1;resize:none;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font:inherit;height:44px;max-height:140px}
  button{background:var(--accent);color:#fff;border:0;border-radius:10px;padding:0 18px;font-weight:600;cursor:pointer}
  button:disabled{opacity:.5;cursor:default}
  .hint{max-width:860px;margin:6px auto 0;color:var(--muted);font-size:12px}
</style>
</head>
<body>
  <header><b>Claims Assistant</b><span>· RAG over policy &amp; guideline docs via Vector Search (MCP)</span></header>
  <div id="chat"></div>
  <footer>
    <div class="row">
      <textarea id="q" placeholder="Ask about claims policy or handling procedures… e.g. Is sewer backup covered?"></textarea>
      <button id="send">Send</button>
    </div>
    <div class="hint">The assistant retrieves from the knowledge base and shows each search step. Answers cite source documents.</div>
  </footer>
<script>
const chat=document.getElementById('chat'), q=document.getElementById('q'), send=document.getElementById('send');
const history=[];  // [{role, content}]

function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function md(s){ // tiny markdown: headings, bold, bullets, code, newlines
  s=esc(s);
  s=s.replace(/^### (.*)$/gm,'<h3>$1</h3>').replace(/^## (.*)$/gm,'<h2>$1</h2>').replace(/^# (.*)$/gm,'<h2>$1</h2>');
  s=s.replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/`([^`]+)`/g,'<code>$1</code>');
  s=s.replace(/^\s*[-•]\s+(.*)$/gm,'<li>$1</li>').replace(/(<li>[\s\S]*?<\/li>)/g,'<ul>$1</ul>');
  return s.replace(/\n{2,}/g,'<br><br>').replace(/\n/g,'<br>');
}
function addMsg(who){
  const w=document.createElement('div');w.className='msg '+(who==='user'?'user':'bot');
  w.innerHTML=`<div class="who">${who==='user'?'You':'AI'}</div><div class="bubble"></div>`;
  chat.appendChild(w);chat.scrollTop=chat.scrollHeight;return w.querySelector('.bubble');
}
function scroll(){chat.scrollTop=chat.scrollHeight;}

async function ask(){
  const text=q.value.trim(); if(!text) return;
  q.value=''; send.disabled=true;
  addMsg('user').textContent=text; history.push({role:'user',content:text});
  const bubble=addMsg('bot');
  const steps=document.createElement('div'); steps.className='steps'; bubble.appendChild(steps);
  const answer=document.createElement('div'); bubble.appendChild(answer);
  const stepByCall={}; let answered=false;

  try{
    const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({input:history})});
    const reader=res.body.getReader(), dec=new TextDecoder(); let buf='';
    while(true){
      const {value,done}=await reader.read(); if(done) break;
      buf+=dec.decode(value,{stream:true}); const parts=buf.split('\n\n'); buf=parts.pop();
      for(const p of parts){
        const line=p.replace(/^data: /,'').trim(); if(!line) continue;
        if(line==='[DONE]') continue;
        let ev; try{ev=JSON.parse(line);}catch(e){continue;}
        if(ev.type==='function_call'){
          let args=''; try{args=JSON.parse(ev.arguments).query||ev.arguments;}catch(e){args=ev.arguments;}
          const d=document.createElement('details'); d.className='step'; d.open=true;
          d.innerHTML=`<summary><span class="spin"></span> Searching the knowledge base: <i>${esc(args)}</i></summary><div class="body">running…</div>`;
          steps.appendChild(d); stepByCall[ev.call_id]=d; scroll();
        }else if(ev.type==='function_call_output'){
          const d=stepByCall[ev.call_id];
          if(d){ d.querySelector('summary').innerHTML=`✓ Retrieved from the knowledge base`;
                 let out=ev.output; try{out=JSON.stringify(JSON.parse(out),null,1);}catch(e){}
                 d.querySelector('.body').textContent=out.slice(0,1200); d.open=false; }
        }else if(ev.type==='message'){
          const c=ev.content; const t=Array.isArray(c)?(c[0]&&c[0].text||''):c;
          answer.innerHTML=md(t); answered=true; history.push({role:'assistant',content:t});
        }else if(ev.type==='error'){
          answer.innerHTML=`<span style="color:#98102a">Error: ${esc(ev.message)}</span>`;
        }
        scroll();
      }
    }
    if(!answered) answer.innerHTML='<span style="color:#98102a">No answer returned.</span>';
  }catch(e){ answer.innerHTML=`<span style="color:#98102a">Request failed: ${esc(e.message)}</span>`; }
  send.disabled=false; q.focus();
}
send.onclick=ask;
q.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();ask();}});
</script>
</body>
</html>
