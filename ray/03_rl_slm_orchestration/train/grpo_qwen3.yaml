# GRPO training config (NeMo RL) for the banking-orchestration SLM.
# GRPO fits this task: no value model, group-relative advantages over the
# num_repeats rollouts per task — cheap enough for a 4B model on serverless GPU.
#
# Launch: see notebooks/02_grpo_train_air_ray.py (runs nemo_rl on AI Runtime + Ray).

policy:
  model_name: Qwen/Qwen3-4B            # ~3B-class Qwen3 policy
  tokenizer: Qwen/Qwen3-4B
  max_prompt_length: 2048
  max_response_length: 1024
  precision: bfloat16
  # LoRA keeps a 4B GRPO run inside a single-node GPU budget; drop for full FT.
  peft:
    enabled: true
    lora_rank: 32
    lora_alpha: 64
    target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]

algorithm:
  name: grpo
  num_generations_per_prompt: 8         # must match dataset num_repeats
  kl_beta: 0.001
  clip_ratio: 0.2
  learning_rate: 1.0e-6
  global_batch_size: 64
  max_steps: 200

# NeMo Gym environment providing the reward (this repo's resources server).
environment:
  gym_config: config.yaml
  agent: banking_orchestration_agent
  reward_key: reward                    # BaseVerifyResponse.reward

# Distributed rollouts + training via Ray on AI Runtime serverless GPU.
cluster:
  backend: ray
  num_gpus: 8                           # single 8xH100 node; use 1 (A10) to smoke-test
  rollout_workers: 16                   # concurrent envs (NeMo Gym scales to thousands)
  vllm_tensor_parallel_size: 1

logging:
  mlflow: true
  experiment: /Users/scott.mckean@databricks.com/rl_slm_orchestration
