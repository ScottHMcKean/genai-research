# NeMo Gym config for the banking-orchestration environment + agent.
# Mirrors example_environments/example_single_tool_call/config.yaml.

banking_orchestration:
  resources_servers:
    banking_orchestration:
      entrypoint: app.py
      domain: agent
      verified: false
      description: FinServ agent-orchestration env with a compliance-policy reward

banking_orchestration_agent:
  responses_api_agents:
    simple_agent:
      entrypoint: app.py            # multi-step tool-calling harness (from NeMo Gym)
      max_steps: 6                  # cap orchestration depth
      resources_server:
        type: resources_servers
        name: banking_orchestration
      model_server:
        type: responses_api_models
        name: policy_model          # defined in ../../config.yaml (vLLM Qwen3-4B)
      datasets:
        - name: example
          type: example
          jsonl_fpath: resources_servers/banking_orchestration/data/example.jsonl
        - name: train
          type: train
          jsonl_fpath: resources_servers/banking_orchestration/data/train.jsonl
          num_repeats: 8            # GRPO group size (rollouts per task)
