# Document Intelligence -- ai_parse_document -> ai_extract -> MLflow evaluate (00->03).
#
# Deploy:  databricks bundle deploy -t dev
# Run:     databricks bundle run -t dev document_intelligence_job
#
# PREREQUISITE: run fins_data_setup_job (fins_data/generate_data.py) first -- it stages
# the insurance PDFs into the raw_pdfs volume. Task 00 here only VERIFIES they exist (it
# does not download them) and writes golden_labels.
#
# Reads/writes the common schema shm_skunkworks_catalog.claims_demo (see
# document_intelligence/config.py). Serverless notebook tasks; each does its own %pip.

resources:
  jobs:
    document_intelligence_job:
      name: "[Doc Intel] Claim PDF extraction -- ai_parse_document vs Ray+FMAPI"
      max_concurrent_runs: 1

      environments:
        - environment_key: serverless_v5
          spec:
            client: "5"

      tasks:
        - task_key: setup_and_data
          notebook_task:
            notebook_path: ../document_intelligence/00_setup_and_data.ipynb
          environment_key: serverless_v5
          timeout_seconds: 1200

        - task_key: parse_and_cost
          depends_on:
            - task_key: setup_and_data
          notebook_task:
            notebook_path: ../document_intelligence/01_parse_and_cost.ipynb
          environment_key: serverless_v5
          timeout_seconds: 3600

        - task_key: extract_fields
          depends_on:
            - task_key: parse_and_cost
          notebook_task:
            notebook_path: ../document_intelligence/02_extract_fields.ipynb
          environment_key: serverless_v5
          timeout_seconds: 3600

        - task_key: evaluate_mlflow
          depends_on:
            - task_key: extract_fields
          notebook_task:
            notebook_path: ../document_intelligence/03_evaluate_mlflow.ipynb
          environment_key: serverless_v5
          timeout_seconds: 1800
