# Vector Search benchmark -- Databricks VS Standard vs Lakebase pgvector.
#
# Deploy:  databricks bundle deploy -t dev
# Run:     databricks bundle run -t dev vs_bench_job
#
# Each task is a serverless notebook task. Dependencies are declared via
# `%pip install --quiet ... ; %restart_python` at the top of each notebook, so
# the job needs no environment_key. `vector_search/config.py` is the single
# source of truth -- flip `DEV_MODE = False` there to run the full benchmark.
#
# Ordering:
#   setup_data  -> setup_vs ---\
#                               +--> benchmark
#                  setup_pg  --/
# setup_vs and setup_pg run in parallel since they read the same embedding tables.

resources:
  jobs:
    vs_bench_job:
      name: "[VS Bench] DBpedia x (VS, pgvector) x (gte, qwen)"
      max_concurrent_runs: 1
      tasks:
        - task_key: setup_data
          notebook_task:
            notebook_path: ../vector_search/2a_setup_data.py
          timeout_seconds: 18000  # 5h -- 1M embeddings per model via ai_query

        - task_key: setup_vs
          depends_on:
            - task_key: setup_data
          notebook_task:
            notebook_path: ../vector_search/2b_setup_vs.py
          timeout_seconds: 3600

        - task_key: setup_pg
          depends_on:
            - task_key: setup_data
          notebook_task:
            notebook_path: ../vector_search/2c_setup_pg.py
          timeout_seconds: 14400  # 4h -- COPY 2.2M rows + HNSW on 1M vectors

        - task_key: benchmark
          depends_on:
            - task_key: setup_vs
            - task_key: setup_pg
          notebook_task:
            notebook_path: ../vector_search/2d_benchmark.py
          timeout_seconds: 7200
